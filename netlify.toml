[build]
  publish = "."

# Raiz vai direto para /login (sem .html)
[[redirects]]
  from = "/"
  to = "/login"
  status = 301
  force = true

# Se alguém digitar login.html → manda para /login
[[redirects]]
  from = "/login.html"
  to = "/login"
  status = 301
  force = true

# Se alguém digitar index.html → manda para /index
[[redirects]]
  from = "/index.html"
  to = "/index"
  status = 301
  force = true

# Serve o arquivo real sem mudar a URL (200 = URL fica limpa)
[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

[[redirects]]
  from = "/index"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"